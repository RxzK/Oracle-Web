services:
  # Oracle Unified Web App
  - type: web
    name: oracle-web-system
    env: node
    plan: free
    # Root directory is the repo root
    rootDir: .
    buildCommand: cd backend && npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: PORT
        value: "10000"
