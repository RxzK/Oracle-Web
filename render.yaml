services:
  # Oracle Unified Web App
  - type: web
    name: oracle-web-system
    env: node
    plan: free
    rootDir: oracle-web
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: PORT
        value: "10000"
