services:
  # Oracle Unified Web App (Functional)
  - type: web
    name: oracle-web-system
    env: node
    plan: free
    rootDir: oracle-web
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && npm install
    startCommand: node backend/server.js
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: PORT
        value: "10000"
